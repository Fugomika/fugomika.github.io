<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <script type="module" crossorigin src="./assets/index-B0WdIeb0.js"></script>
  </head>
  <body>
    <style>
      @font-face {
        font-family: monogram;
        src: url("monogram.ttf");
      }

      body {
        font-family: monogram, monospace;
        font-size: 2rem;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
      }

      #textbox {
        position: absolute;
        left: 10%;
        right: 10%;
        bottom: 2vh;
        min-height: 15vh;
        background-color: white;
        border: 3px solid black;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: flex-start; /* top-left */
        align-items: flex-start;
        word-spacing: 0.2rem;
        filter: drop-shadow(0 0 0.5rem rgb(122, 121, 121));
      }

      .ui-text{
        margin: 0;
        user-select: none; /* disable text selection */
      }

      .ui-close-button {
        font-family: inherit; /* inherit from parent */
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
      }

      .btn-container {
        align-self: flex-end;
        margin-top: 1rem;
      }

      .note {
        position: absolute;
        left: 5%;
        top: 1vh;
        color: white;
        display: flex;
        flex-direction: column;
        user-select: none;
      }

    </style>
    <div id="app">
      <div id="ui">
        <p class="note">Tap/Click around to move</p>
        <div id="textbox-container" style="display: none;">
          <div id="textbox">
            <p id="dialogue" class="ui-text"></p>
            <div class="btn-container">
              <button id="close" class="ui-close-button">Close</button>
            </div>
          </div>
        </div>
      </div>
      <canvas id="game"></canvas>
    </div>
  </body>
</html>
